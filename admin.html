<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Administrativo • SINDRAS-PB</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
--primary:#00d9ff;
--secondary:#0099ff;
--bg:#07111f;
--card:rgba(16,27,46,.85);
--border:rgba(255,255,255,.08);
--text:#ffffff;
--danger:#ff4d6d;
--warning:#ffc857;
--success:#00ff9c;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:
radial-gradient(circle at top left, rgba(0,217,255,.15), transparent 30%),
radial-gradient(circle at bottom right, rgba(0,153,255,.15), transparent 30%),
var(--bg);
min-height:100vh;
color:white;
padding:30px;
}

.glass{
background:var(--card);
backdrop-filter:blur(14px);
border:1px solid var(--border);
border-radius:24px;
box-shadow:0 8px 32px rgba(0,0,0,.35);
}

.logo-title{
font-family:'Orbitron',sans-serif;
font-size:2rem;
color:var(--primary);
text-shadow:0 0 12px rgba(0,217,255,.5);
}

.card-admin{
padding:25px;
margin-bottom:25px;
}

.form-control,
.form-select{
background:#101b2e !important;
border:1px solid rgba(255,255,255,.08) !important;
color:white !important;
padding:14px !important;
border-radius:14px !important;
}

.form-control:focus,
.form-select:focus{
box-shadow:0 0 10px rgba(0,217,255,.3) !important;
border-color:var(--primary) !important;
}

.form-control::placeholder{
color:#9fb3c8;
}

.table{
color:white;
}

.table thead th{
background:rgba(255,255,255,.04);
color:var(--primary);
border-color:rgba(255,255,255,.08);
padding:16px;
}

.table td{
padding:16px;
border-color:rgba(255,255,255,.05);
vertical-align:middle;
}

.table tbody tr:hover{
background:rgba(0,217,255,.05);
}

.btn-futuro{
background:linear-gradient(135deg,#00d9ff,#0099ff);
border:none;
padding:14px 24px;
border-radius:14px;
color:white;
font-weight:600;
transition:.3s;
}

.btn-futuro:hover{
transform:translateY(-2px);
box-shadow:0 0 15px rgba(0,217,255,.4);
}

.btn-delete{
background:var(--danger);
border:none;
padding:10px 14px;
border-radius:10px;
color:white;
margin-left:6px;
}

.btn-edit{
background:var(--warning);
border:none;
padding:10px 14px;
border-radius:10px;
color:black;
}

.btn-download{
background:var(--success);
border:none;
padding:10px 14px;
border-radius:10px;
color:black;
margin-left:6px;
}

.badge-status{
padding:8px 14px;
border-radius:30px;
font-size:.75rem;
font-weight:600;
}

.status-online{
background:rgba(0,255,156,.15);
color:var(--success);
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
gap:20px;
}

@media(max-width:768px){
.topbar{
flex-direction:column;
align-items:flex-start;
}
}
</style>
</head>
<body>

<script>
if(localStorage.getItem('logado') !== 'sim'){
window.location.href = 'login.html';
}
</script>

<div class="topbar">

<div>
<h1 class="logo-title">
<i class="bi bi-shield-lock-fill"></i>
 PAINEL ADMINISTRATIVO
</h1>
<p class="text-light opacity-75 mt-2">
Gerenciamento Inteligente • SINDRAS-PB
</p>
</div>

<div>
<button onclick="logout()" class="btn btn-danger px-4 py-2 rounded-4">
<i class="bi bi-box-arrow-right"></i>
 Sair
</button>
</div>

</div>

<div class="glass card-admin">

<h3 class="mb-4">
<i class="bi bi-folder-plus"></i>
 Cadastro de Documentos
</h3>

<form id="arquivoForm">

<div class="row">

<div class="col-md-2 mb-3">
<label>Categoria</label>
<select id="categoria" class="form-select" required>
<option value="Ofícios Enviados">Ofícios Enviados</option>
<option value="Ofícios Recebidos">Ofícios Recebidos</option>
<option value="Contratos">Contratos</option>
<option value="Minutas">Minutas</option>
</select>
</div>

<div class="col-md-2 mb-3">
<label>Número</label>
<input type="text" id="numero" class="form-control" placeholder="001/2026" required>
</div>

<div class="col-md-3 mb-3">
<label>Destino</label>
<input type="text" id="destino" class="form-control" placeholder="Prefeitura" required>
</div>

<div class="col-md-3 mb-3">
<label>Assunto</label>
<input type="text" id="assunto" class="form-control" placeholder="Assunto" required>
</div>

<div class="col-md-2 mb-3">
<label>Arquivo</label>
<input type="file" id="arquivo" class="form-control">
</div>

</div>

<div class="d-flex gap-3 mt-2 flex-wrap">

<button type="submit" class="btn-futuro">
<i class="bi bi-check-circle"></i>
 Salvar Documento
</button>

<button type="button" onclick="limparFormulario()" class="btn btn-secondary rounded-4 px-4">
<i class="bi bi-eraser"></i>
 Limpar
</button>

</div>

</form>

</div>

<div class="glass card-admin">

<div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">

<h3>
<i class="bi bi-files"></i>
 Documentos Cadastrados
</h3>

<input type="text" id="busca" class="form-control" placeholder="Buscar documento..." style="max-width:320px;">

</div>

<div class="table-responsive">

<table class="table align-middle">

<thead>
<tr>
<th>Categoria</th>
<th>Número</th>
<th>Destino</th>
<th>Assunto</th>
<th>Arquivo</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="tabelaArquivos">
</tbody>

</table>

</div>

</div>

<script>

const form = document.getElementById('arquivoForm');
const tabela = document.getElementById('tabelaArquivos');
const busca = document.getElementById('busca');

let editando = null;

let arquivos = JSON.parse(localStorage.getItem('oficiosEnviados')) || [];

function salvarLocal(){
localStorage.setItem('oficiosEnviados', JSON.stringify(arquivos));
}

function renderizarTabela(filtro = ''){

    tabela.innerHTML = '';

    const dadosFiltrados = arquivos.filter(item => {

        return (
            item.numero.toLowerCase().includes(filtro.toLowerCase()) ||
            item.destino.toLowerCase().includes(filtro.toLowerCase()) ||
            item.assunto.toLowerCase().includes(filtro.toLowerCase()) ||
            item.categoria.toLowerCase().includes(filtro.toLowerCase())
        );

    });

    if(dadosFiltrados.length === 0){

        tabela.innerHTML = `
        <tr>
            <td colspan="7" class="text-center py-5 opacity-75">
            Nenhum documento encontrado.
            </td>
        </tr>
        `;

        return;

    }

    dadosFiltrados.forEach((item,index)=>{

        tabela.innerHTML += `

        <tr>

        <td>${item.categoria}</td>
        <td>${item.numero}</td>
        <td>${item.destino}</td>
        <td>${item.assunto}</td>

        <td>
        ${item.nomeArquivo}
        </td>

        <td>
        <span class="badge-status status-online">
        ATIVO
        </span>
        </td>

        <td>

        <button class="btn-edit" onclick="editar(${index})">
        <i class="bi bi-pencil"></i>
        </button>

        <button class="btn-delete" onclick="excluir(${index})">
        <i class="bi bi-trash"></i>
        </button>

        </td>

        </tr>

        `;

    });

}

renderizarTabela();

form.addEventListener('submit', function(e){

    e.preventDefault();

    const categoria = document.getElementById('categoria').value;
    const numero = document.getElementById('numero').value;
    const destino = document.getElementById('destino').value;
    const assunto = document.getElementById('assunto').value;
    const arquivo = document.getElementById('arquivo').files[0];

    const novoDocumento = {
        categoria,
        numero,
        destino,
        assunto,
        nomeArquivo: arquivo ? arquivo.name : 'Sem arquivo'
    };

    if(editando !== null){

        arquivos[editando] = novoDocumento;
        editando = null;

    } else {

        arquivos.push(novoDocumento);

    }

    salvarLocal();
    renderizarTabela();
    form.reset();

});

function excluir(index){

    if(confirm('Deseja excluir este documento?')){

        arquivos.splice(index,1);

        salvarLocal();

        renderizarTabela();

    }

}

function editar(index){

    const item = arquivos[index];

    document.getElementById('categoria').value = item.categoria;
    document.getElementById('numero').value = item.numero;
    document.getElementById('destino').value = item.destino;
    document.getElementById('assunto').value = item.assunto;

    editando = index;

    window.scrollTo({
        top:0,
        behavior:'smooth'
    });

}

function limparFormulario(){

    form.reset();
    editando = null;

}

busca.addEventListener('keyup', function(){

    renderizarTabela(busca.value);

});

function logout(){

    localStorage.removeItem('logado');

    window.location.href = 'login.html';

}

</script>

</body>
</html>
