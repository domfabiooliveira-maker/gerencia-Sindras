<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
body{
background:#07111f;
color:white;
font-family:Arial;
padding:30px;
}

.card-admin{
background:rgba(255,255,255,0.05);
border-radius:20px;
padding:25px;
backdrop-filter:blur(10px);
margin-bottom:25px;
}

input, select{
background:#101b2e !important;
color:white !important;
border:none !important;
padding:12px !important;
}

.table{
color:white;
}

.btn-futuro{
background:linear-gradient(135deg,#00d9ff,#0099ff);
border:none;
color:white;
padding:12px 20px;
border-radius:12px;
}

.btn-delete{
background:#ff4d6d;
border:none;
padding:8px 12px;
border-radius:10px;
color:white;
}

.btn-edit{
background:#ffc857;
border:none;
padding:8px 12px;
border-radius:10px;
color:black;
}
</style>
</head>
<body>

<script>
if(localStorage.getItem('logado') !== 'sim'){
window.location.href = 'login.html';
}
</script>

<div class="d-flex justify-content-between align-items-center mb-4">
<h1>PAINEL ADMINISTRATIVO</h1>

<button onclick="logout()" class="btn btn-danger">
Sair
</button>
</div>

<div class="card-admin">

<h3 class="mb-4">Cadastrar Arquivo</h3>

<form id="arquivoForm">

<div class="row">

<div class="col-md-3 mb-3">
<input type="text" id="numero" class="form-control" placeholder="Número">
</div>

<div class="col-md-3 mb-3">
<input type="text" id="destino" class="form-control" placeholder="Destino">
</div>

<div class="col-md-3 mb-3">
<input type="text" id="assunto" class="form-control" placeholder="Assunto">
</div>

<div class="col-md-3 mb-3">
<input type="file" id="arquivo" class="form-control">
</div>

</div>

<button class="btn-futuro">
Salvar Arquivo
</button>

</form>

</div>

<div class="card-admin">

<h3 class="mb-4">Documentos Cadastrados</h3>

<div class="table-responsive">

<table class="table">

<thead>
<tr>
<th>Número</th>
<th>Destino</th>
<th>Assunto</th>
<th>Arquivo</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="tabelaArquivos">
</tbody>

</table>

</div>

</div>

<script>

const form = document.getElementById('arquivoForm');
const tabela = document.getElementById('tabelaArquivos');

let arquivos = JSON.parse(localStorage.getItem('arquivos')) || [];

function renderizarTabela(){

    tabela.innerHTML = '';

    arquivos.forEach((item,index)=>{

        tabela.innerHTML += `

        <tr>

        <td>${item.numero}</td>
        <td>${item.destino}</td>
        <td>${item.assunto}</td>

        <td>
        ${item.nomeArquivo}
        </td>

        <td>

        <button class="btn-edit" onclick="editar(${index})">
        <i class="bi bi-pencil"></i>
        </button>

        <button class="btn-delete" onclick="excluir(${index})">
        <i class="bi bi-trash"></i>
        </button>

        </td>

        </tr>

        `;

    });

}

renderizarTabela();

form.addEventListener('submit', function(e){

    e.preventDefault();

    const numero = document.getElementById('numero').value;
    const destino = document.getElementById('destino').value;
    const assunto = document.getElementById('assunto').value;
    const arquivo = document.getElementById('arquivo').files[0];

    arquivos.push({

        numero,
        destino,
        assunto,
        nomeArquivo: arquivo ? arquivo.name : 'Sem arquivo'

    });

    localStorage.setItem('arquivos', JSON.stringify(arquivos));

    renderizarTabela();

    form.reset();

});

function excluir(index){

    if(confirm('Deseja excluir este documento?')){

        arquivos.splice(index,1);

        localStorage.setItem('arquivos', JSON.stringify(arquivos));

        renderizarTabela();

    }

}

function editar(index){

    const item = arquivos[index];

    document.getElementById('numero').value = item.numero;
    document.getElementById('destino').value = item.destino;
    document.getElementById('assunto').value = item.assunto;

    arquivos.splice(index,1);

    localStorage.setItem('arquivos', JSON.stringify(arquivos));

    renderizarTabela();

}

function logout(){

    localStorage.removeItem('logado');

    window.location.href = 'login.html';

}

</script>

</body>
</html>
